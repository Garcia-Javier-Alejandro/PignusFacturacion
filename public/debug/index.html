<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mercado Libre Debug | Pignus</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="debug-shell">
      <header class="debug-header">
        <div>
          <p class="eyebrow">Pignus Debug</p>
          <h1>Mercado Libre API summary</h1>
        </div>
        <a href="/">Home</a>
      </header>

      <section id="summary" class="debug-summary"></section>
      <section class="admin-key-panel">
        <label for="admin-key">Admin API key</label>
        <div>
          <input id="admin-key" type="password" autocomplete="off">
          <button id="save-admin-key" type="button">Save</button>
        </div>
      </section>
      <section class="table-panel">
        <div class="table-panel__header">
          <div>
            <h2>Google Sheets output</h2>
            <p id="export-status" class="muted">Rows are built from the current API response.</p>
          </div>
          <button id="export-sheet" type="button">Export to Google Sheets</button>
        </div>
        <div class="table-wrap">
          <table id="output-table"></table>
        </div>
      </section>
      <section class="table-panel">
        <div class="table-panel__header">
          <div>
            <h2>Raw API returns</h2>
            <p class="muted">Unmodified paid order objects returned by the server-side Mercado Libre request.</p>
          </div>
        </div>
        <pre id="raw-orders" class="raw-json"></pre>
      </section>
      <section id="orders" class="orders"></section>
    </main>

    <template id="order-template">
      <article class="order-card">
        <div class="order-card__header">
          <div>
            <h2></h2>
            <p class="muted"></p>
          </div>
          <span class="status-pill"></span>
        </div>
        <div class="metrics"></div>
        <details>
          <summary>Payments and fee details</summary>
          <pre></pre>
        </details>
      </article>
    </template>

    <script>
      const money = new Intl.NumberFormat('es-AR', {
        style: 'currency',
        currency: 'ARS',
      });

      const formatMoney = (value) => money.format(Number(value || 0));
      const outputMoneyColumns = new Set([
        'Pago',
        'Recargo MP',
        'Retencion IIBB',
        'Imp SIRTAC',
        'Costo Envio',
        'Neto',
        'Validacion Neto',
      ]);

      let latestLimit = 10;
      let latestAdminKey = '';
      let latestOutputRows = [];

      const metric = (label, value) => {
        const node = document.createElement('div');
        node.className = 'metric';
        node.innerHTML = `<span>${label}</span><strong>${value}</strong>`;
        return node;
      };

      const renderOutputTable = (headers = [], rows = []) => {
        const table = document.querySelector('#output-table');
        table.innerHTML = '';

        const thead = document.createElement('thead');
        const headRow = document.createElement('tr');

        for (const header of headers) {
          const th = document.createElement('th');
          th.textContent = header;
          headRow.append(th);
        }

        thead.append(headRow);
        table.append(thead);

        const tbody = document.createElement('tbody');

        for (const row of rows) {
          const tr = document.createElement('tr');

          row.forEach((value, index) => {
            const td = document.createElement('td');
            const header = headers[index];
            td.textContent = outputMoneyColumns.has(header) ? formatMoney(value) : value;
            tr.append(td);
          });

          tbody.append(tr);
        }

        if (rows.length === 0) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = Math.max(headers.length, 1);
          td.textContent = 'No rows returned.';
          tr.append(td);
          tbody.append(tr);
        }

        table.append(tbody);
      };

      const adminKeyInput = document.querySelector('#admin-key');
      const saveAdminKeyButton = document.querySelector('#save-admin-key');
      const exportButton = document.querySelector('#export-sheet');
      const exportStatus = document.querySelector('#export-status');

      adminKeyInput.value = localStorage.getItem('pignus.adminApiKey') || '';
      saveAdminKeyButton.addEventListener('click', () => {
        localStorage.setItem('pignus.adminApiKey', adminKeyInput.value);
        render();
      });

      exportButton.addEventListener('click', async () => {
        exportButton.disabled = true;
        exportStatus.textContent = 'Exporting rows to Google Sheets...';

        try {
          const response = await fetch('/api/orders/export', {
            method: 'POST',
            headers: {
              'content-type': 'application/json',
              ...(latestAdminKey ? { authorization: `Bearer ${latestAdminKey}` } : {}),
            },
            body: JSON.stringify({ limit: latestLimit, rows: latestOutputRows }),
          });

          if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            throw new Error(error.error || 'Export request failed.');
          }

          const result = await response.json();
          exportStatus.textContent = `Exported ${result.exported_rows} new rows to ${result.sheet_name}. Skipped ${result.skipped_existing} existing orders.`;
        } catch (error) {
          exportStatus.textContent = error.message;
        } finally {
          exportButton.disabled = false;
        }
      });

      const render = async () => {
        const summary = document.querySelector('#summary');
        const orders = document.querySelector('#orders');
        const template = document.querySelector('#order-template');
        const adminKey = localStorage.getItem('pignus.adminApiKey') || '';
        latestAdminKey = adminKey;

        orders.innerHTML = '';
        document.querySelector('#raw-orders').textContent = '';
        latestOutputRows = [];
        renderOutputTable([], []);

        try {
          const response = await fetch(`/api/orders/summary?limit=${latestLimit}`, {
            cache: 'no-store',
            headers: adminKey ? { authorization: `Bearer ${adminKey}` } : {},
          });

          if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            throw new Error(error.error || 'Debug API request failed.');
          }

          const data = await response.json();
          summary.innerHTML = `
            <div><span>Generated</span><strong>${data.generated_at}</strong></div>
            <div><span>Orders returned</span><strong>${data.count}</strong></div>
            <div><span>Source</span><strong>Cloudflare Function</strong></div>
          `;
          renderOutputTable(data.output_headers, data.output_rows);
          latestOutputRows = data.output_rows || [];
          document.querySelector('#raw-orders').textContent = JSON.stringify(data.raw_orders, null, 2);
          exportStatus.textContent = `${latestOutputRows.length} rows ready for Google Sheets export.`;

          for (const order of data.orders) {
            const row = order.financial_row;
            const card = template.content.cloneNode(true);

            card.querySelector('h2').textContent = `Order ${order.order_id}`;
            card.querySelector('.muted').textContent = `${order.buyer_name || 'No buyer name'} | ${order.localidad || 'No city'} | ${order.date_created || 'No date'}`;
            card.querySelector('.status-pill').textContent = order.status || 'unknown';

            const metrics = card.querySelector('.metrics');
            metrics.append(
              metric('Pago', formatMoney(row.pago)),
              metric('Recargo MP', formatMoney(row.recargo_mp)),
              metric('IIBB', formatMoney(row.retencion_iibb)),
              metric('SIRTAC', formatMoney(row.imp_sirtac)),
              metric('Costo envio', formatMoney(row.costo_envio)),
              metric('Neto', formatMoney(row.neto)),
              metric('Validacion', formatMoney(row.validacion_neto)),
            );

            card.querySelector('pre').textContent = JSON.stringify(order.payments, null, 2);
            orders.append(card);
          }
        } catch (error) {
          summary.innerHTML = `
            <div>
              <span>Status</span>
              <strong>${error.message}</strong>
            </div>
          `;
        }
      };

      render();
    </script>
  </body>
</html>
