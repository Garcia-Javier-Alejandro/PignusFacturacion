<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pignus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="header">
      <div>
        <h1 class="header__title">Pignus</h1>
        <p class="header__sub">Mercado Libre → Google Sheets</p>
      </div>
      <div class="header__key">
        <input id="admin-key" type="password" placeholder="Admin API key" autocomplete="off" spellcheck="false">
        <button id="save-key" type="button" class="btn btn--ghost">Save</button>
      </div>
    </header>

    <main class="main">
      <div class="toolbar">
        <button id="fetch-btn" type="button" class="btn btn--primary">
          <span id="fetch-label">Fetch last 20 orders</span>
        </button>
        <button id="export-btn" type="button" class="btn btn--secondary" disabled>Append new entries to Google Sheet</button>
        <button id="open-btn" type="button" class="btn btn--ghost" disabled>Open Sheet ↗</button>
        <button id="auth-btn" type="button" class="btn btn--ghost">Re-authorize ML ↗</button>
        <p id="status" class="status" aria-live="polite"></p>
      </div>

      <section id="table-section" hidden>
        <div class="table-wrap">
          <table id="orders-table" class="orders-table"></table>
        </div>
      </section>
    </main>

    <script>
      const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1Z6Z8UBOw8gkz77oz8M3L7CXlxt5ar146A3-n9EJLEDw';
      const MONEY_COLS = new Set(['Pago', 'Recargo MP', 'Retencion IIBB', 'Imp SIRTAC', 'Costo Envio', 'Neto']);

      const ars = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' });

      const formatDate = (val) => {
        if (!val) return '';
        const d = new Date(val);
        if (Number.isNaN(d.getTime())) return val;
        return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
      };

      const $ = (id) => document.getElementById(id);

      const keyInput     = $('admin-key');
      const fetchBtn     = $('fetch-btn');
      const fetchLbl     = $('fetch-label');
      const tableSection = $('table-section');
      const table        = $('orders-table');
      const exportBtn    = $('export-btn');
      const openBtn      = $('open-btn');
      const statusEl     = $('status');

      keyInput.value = localStorage.getItem('pignus.adminApiKey') || '';

      const setStatus = (msg, type = '') => {
        statusEl.textContent = msg;
        statusEl.className = `status${type ? ` status--${type}` : ''}`;
      };

      const authHeader = () => {
        const key = localStorage.getItem('pignus.adminApiKey') || '';
        return key ? { authorization: `Bearer ${key}` } : {};
      };

      $('save-key').addEventListener('click', () => {
        localStorage.setItem('pignus.adminApiKey', keyInput.value);
        setStatus('Key saved.', 'ok');
      });

      const renderTable = ({ headers, rows }) => {
        table.innerHTML = '';

        const thead = document.createElement('thead');
        const headRow = document.createElement('tr');
        for (const h of headers) {
          const th = document.createElement('th');
          th.textContent = h;
          if (MONEY_COLS.has(h)) th.classList.add('num');
          headRow.append(th);
        }
        thead.append(headRow);
        table.append(thead);

        const tbody = document.createElement('tbody');

        if (rows.length === 0) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = headers.length;
          td.className = 'empty';
          td.textContent = 'No orders found.';
          tr.append(td);
          tbody.append(tr);
        } else {
          for (const row of rows) {
            const tr = document.createElement('tr');
            row.forEach((val, i) => {
              const td = document.createElement('td');
              const h = headers[i];
              if (h === 'Fecha') {
                td.textContent = formatDate(val);
              } else if (MONEY_COLS.has(h)) {
                td.textContent = ars.format(Number(val || 0));
                td.classList.add('num');
              } else {
                td.textContent = val ?? '';
              }
              tr.append(td);
            });
            tbody.append(tr);
          }
        }

        table.append(tbody);
      };

      fetchBtn.addEventListener('click', async () => {
        fetchBtn.disabled = true;
        fetchLbl.textContent = 'Fetching…';
        tableSection.hidden = true;
        exportBtn.disabled = true;
        openBtn.disabled = true;
        setStatus('Loading orders…');

        try {
          const res = await fetch('/api/orders/recent', { headers: authHeader() });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Request failed.');
          renderTable(data);
          tableSection.hidden = false;
          exportBtn.disabled = false;
          openBtn.disabled = false;
          const n = data.rows.length;
          setStatus(`${n} order${n !== 1 ? 's' : ''} loaded.`, 'ok');
        } catch (err) {
          setStatus(err.message, 'err');
        } finally {
          fetchBtn.disabled = false;
          fetchLbl.textContent = 'Fetch last 20 orders';
        }
      });

      exportBtn.addEventListener('click', async () => {
        exportBtn.disabled = true;
        setStatus('Appending new entries to Google Sheet…');

        try {
          const res = await fetch('/api/orders/export', {
            method: 'POST',
            headers: authHeader(),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Export failed.');
          setStatus(`Appended ${data.exported_rows} new rows. ${data.skipped_existing} already present.`, 'ok');
        } catch (err) {
          setStatus(err.message, 'err');
        } finally {
          exportBtn.disabled = false;
        }
      });

      openBtn.addEventListener('click', () => window.open(SHEET_URL, '_blank'));

      $('auth-btn').addEventListener('click', () => window.location.href = '/api/meli/login');
    </script>
  </body>
</html>
