<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pignus — Facturación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://ui.pignuslabs.com.ar/pignus.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
  </head>
  <body>
    <header class="header">
      <a href="https://pignuslabs.com.ar/" style="display:flex;align-items:center;text-decoration:none">
        <img src="/PignusLabs_Logo.png" alt="Pignus Labs" class="header__logo">
      </a>
      <nav class="mod-nav" style="margin-left:1.5rem">
        <a href="https://pignuslabs.com.ar/" class="mod-nav__item">Portal</a>
        <a href="#" class="mod-nav__item mod-nav__item--active">Facturación</a>
        <a href="https://inversiones.pignuslabs.com.ar/" class="mod-nav__item">Inversiones</a>
      </nav>
      <span class="header__user" id="header-user"></span>
    </header>

    <main class="main">

      <!-- ── KPI strip ────────────────────────────────────────────────────── -->
      <div class="kpi-strip">

        <!-- Card 1: Ventas -->
        <div class="kpi-card">
          <div class="kpi-card__eyebrow">Ventas este mes</div>
          <div style="display:flex;gap:1.25rem;flex:1;min-height:0">
            <div style="flex:1;display:flex;flex-direction:column;gap:.3rem">
              <div class="kpi-card__value" id="kpi-sales-month">—</div>
              <div class="kpi-card__meta" style="margin-top:0">
                <span class="kpi-delta" id="kpi-sales-delta"></span>
                <span id="kpi-sales-delta-label"></span>
              </div>
              <svg class="kpi-spark" id="spark-sales" viewBox="0 0 200 36" preserveAspectRatio="none" style="margin-top:auto"></svg>
            </div>
            <div style="flex:1;display:flex;flex-direction:column;gap:.3rem;min-width:0">
              <div class="kpi-card__eyebrow" style="color:var(--ink-2)">Ingresos Netos</div>
              <div class="kpi-card__value" id="kpi-neto-month" style="font-size:clamp(1rem,2vw,1.5rem)">—</div>
              <div class="kpi-card__meta" style="margin-top:0">
                <span class="kpi-delta" id="kpi-neto-delta"></span>
                <span id="kpi-neto-delta-label"></span>
              </div>
              <svg class="kpi-spark" id="spark-neto" viewBox="0 0 200 36" preserveAspectRatio="none" style="margin-top:auto"></svg>
            </div>
          </div>
        </div>

        <!-- Card 2: Facturado -->
        <div class="kpi-card">
          <div class="kpi-card__eyebrow">Facturado este mes</div>
          <div class="kpi-card__value kpi-card__value--lg" id="kpi-billed-month">—</div>
          <div id="kpi-pending-block" style="display:none;margin-top:auto">
            <div style="background:#fef3c7;border-radius:.75rem;padding:.75rem 1rem">
              <div style="font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#92400e;margin-bottom:.25rem">Pendiente de facturar</div>
              <div style="font-size:1.25rem;font-weight:700;color:#92400e;line-height:1" id="kpi-pending-amount">—</div>
              <div style="font-size:.75rem;color:#b45309;margin-top:.3rem" id="kpi-pending-count">—</div>
            </div>
          </div>
        </div>

        <!-- Card 3: Restante en categoría -->
        <div class="kpi-card">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div class="kpi-card__eyebrow">Restante en categoría</div>
            <select id="tax-category" class="kpi-card__cat-select">
              <option value="A">Cat. A</option>
              <option value="B">Cat. B</option>
              <option value="C">Cat. C</option>
              <option value="D">Cat. D</option>
              <option value="E">Cat. E</option>
              <option value="F">Cat. F</option>
              <option value="G">Cat. G</option>
              <option value="H" selected>Cat. H</option>
              <option value="J">Cat. J</option>
              <option value="K">Cat. K</option>
            </select>
          </div>
          <div class="kpi-card__value" id="kpi-remaining">—</div>
          <div class="kpi-card__bars">
            <div class="kpi-bar-row">
              <div class="kpi-bar-row__header">
                <span class="kpi-bar-row__label">Este año</span>
                <span class="kpi-bar-row__amount" id="bar-year-amount"></span>
              </div>
              <div class="kpi-bar-row__track">
                <div class="kpi-bar-row__fill" id="bar-year-fill" style="width:0%"></div>
              </div>
            </div>
            <div class="kpi-bar-row">
              <div class="kpi-bar-row__header">
                <span class="kpi-bar-row__label">Este mes</span>
                <span class="kpi-bar-row__amount" id="bar-month-amount"></span>
              </div>
              <div class="kpi-bar-row__track">
                <div class="kpi-bar-row__fill" id="bar-month-fill" style="width:0%"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Period row ───────────────────────────────────────────────────── -->
      <div class="kpi-period-row">
        <span class="kpi-period-row__label">Período</span>
        <div class="kpi-period-row__inputs">
          <input type="date" id="period-from" class="manual-input">
          <span class="kpi-period-row__sep">—</span>
          <input type="date" id="period-to" class="manual-input">
        </div>
        <div class="kpi-period-row__results">
          <div class="kpi-inline">
            <span class="kpi-card__eyebrow">Ventas</span>
            <span class="kpi-card__value" id="kpi-sales-period">—</span>
          </div>
          <div class="kpi-inline">
            <span class="kpi-card__eyebrow">Facturado</span>
            <span class="kpi-card__value" id="kpi-billed-period">—</span>
          </div>
        </div>
      </div>

      <!-- ── Toolbar ──────────────────────────────────────────────────────── -->
      <div class="toolbar">
        <div class="toolbar-left">
          <button id="add-row-btn" type="button" class="btn btn--primary">+ Agregar fila</button>
          <button id="edit-btn" type="button" class="btn btn--ghost" disabled>✎ Editar</button>
          <button id="delete-btn" type="button" class="btn btn--ghost btn--danger" disabled>✕ Eliminar</button>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
        <div class="toolbar-right">
          <button id="export-btn" type="button" class="btn btn--secondary" disabled>Añadir a Sheets</button>
          <button id="open-btn" type="button" class="btn btn--secondary" disabled>↗ Abrir Sheets</button>
        </div>
      </div>

      <!-- ── Table ────────────────────────────────────────────────────────── -->
      <section id="table-section">
        <div class="table-wrap">
          <table id="orders-table" class="orders-table"></table>
        </div>
      </section>

      <!-- ── Import bar ────────────────────────────────────────────────────── -->
      <div class="meta-bar" id="meta-bar">
        <button id="fetch-btn" type="button" class="btn btn--primary">
          <span id="fetch-label">+ Cargar pedidos</span>
        </button>
        <span class="meta-sep">·</span>
        <button id="import-btn" type="button" class="btn btn--secondary">Importar historial 2026</button>
        <button id="stop-import-btn" type="button" class="btn btn--danger" disabled>⏹ Detener</button>
        <span class="meta-sep">·</span>
        <button id="contabilium-btn" type="button" class="btn btn--secondary">📄 Contabilium</button>
        <input type="file" id="contabilium-file" accept=".xlsx" hidden>
        <span class="meta-sep">·</span>
        <span id="meta-count">—</span>
        <span class="meta-sep">·</span>
        <span id="meta-oldest">Más antigua: —</span>
        <span class="meta-sep">·</span>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-bar__fill" id="progress-fill" style="width:0%"></div></div>
          <span id="progress-text">0%</span>
          <span class="progress-label">de 2026</span>
        </div>
        <button id="expand-btn" type="button" class="btn btn--ghost btn--expand">Expandir →</button>
      </div>

      <!-- ── Contabilium import modal ──────────────────────────────────────── -->
      <div id="ctb-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:1rem">
        <div class="kpi-card" style="max-width:500px;width:100%;max-height:80vh;overflow-y:auto;min-height:0;padding:1.5rem">
          <div style="font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:1rem">Importar Contabilium</div>
          <div id="ctb-modal-body"></div>
          <div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.25rem">
            <button id="ctb-cancel" type="button" class="btn btn--ghost">Cancelar</button>
            <button id="ctb-confirm" type="button" class="btn btn--primary">Confirmar →</button>
          </div>
        </div>
      </div>

      <details class="debug-section">
        <summary>Aux Debug Tools</summary>
        <div class="debug-body">
          <button id="clear-cache-btn" type="button" class="btn btn--danger">✕ Limpiar caché</button>
          <button id="clear-dates-btn" type="button" class="btn btn--danger">✕ Limpiar Fecha Factura</button>
          <span id="clear-cache-status" class="debug-status"></span>
        </div>
      </details>

      <div hidden id="auth-section" style="margin-top:1rem">
        <button id="auth-btn" type="button" class="btn btn--ghost">Re-authorize ML ↗</button>
      </div>
    </main>

    <footer class="footer">
      <p>Hecho por Javi con ☕ &amp; ✨ en 2026</p>
    </footer>

    <script>
      let SHEET_URL = null;
      const HISTORY_CUTOFF = new Date('2026-01-01T00:00:00');
      const MONEY_COLS   = new Set(['Pago', 'Recargo MP', 'Retencion IIBB', 'Imp SIRTAC', 'Suma Impuestos', 'Costo Envio', 'Neto', 'Cupón']);
      const READONLY_COLS = new Set(['Suma Impuestos', 'Neto']);
      const DATE_COLS    = new Set(['Fecha Compra', 'Fecha Factura']);

      const COLLAPSED_COLS = ['Nombre', 'Fecha Factura', 'Nº Factura', 'Pago', 'Cupón', 'Suma Impuestos', 'Costo Envio', 'Neto', 'Provincia', 'Estado'];
      const EXPANDED_COLS  = ['Orden ID', 'Nombre', 'Fecha Compra', 'Fecha Factura', 'Nº Factura', 'Pago', 'Cupón', 'Retencion IIBB', 'Imp SIRTAC', 'Suma Impuestos', 'Costo Envio', 'Neto', 'Provincia', 'Localidad', 'Orígen', 'Estado'];

      const TAX_CATEGORIES = {
        A: 6_800_000,  B: 10_200_000, C: 14_400_000, D: 20_200_000,
        E: 28_500_000, F: 40_000_000, G: 51_000_000, H: 61_344_853,
        J: 76_500_000, K: 94_805_682,
      };

      const NOW           = new Date();
      const CURRENT_MONTH = NOW.getMonth();
      const CURRENT_YEAR  = NOW.getFullYear();

      let isExpanded = false;
      const getVisibleCols = (headers) => (isExpanded ? EXPANDED_COLS : COLLAPSED_COLS)
        .map((name) => ({ name, idx: name === 'Estado' ? -2 : headers.indexOf(name) }))
        .filter(({ name, idx }) => name === 'Estado' || idx !== -1);

      const ars = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' });

      const formatDate = (val) => {
        if (!val) return '';
        const d = new Date(val);
        if (Number.isNaN(d.getTime())) return val;
        return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
      };

      const toDateInputVal = (val) => {
        if (!val) return '';
        const d = new Date(val);
        return Number.isNaN(d.getTime()) ? '' : d.toISOString().slice(0, 10);
      };

      const calcProgress = (oldestDateStr) => {
        if (!oldestDateStr) return 0;
        const oldest = new Date(oldestDateStr);
        const now = new Date();
        return Math.min(100, Math.max(0, Math.round(((now - oldest) / (now - HISTORY_CUTOFF)) * 100)));
      };

      const $ = (id) => document.getElementById(id);

      const fetchBtn        = $('fetch-btn');
      const fetchLbl        = $('fetch-label');
      const importBtn       = $('import-btn');
      const addRowBtn       = $('add-row-btn');
      const editBtn         = $('edit-btn');
      const deleteBtn       = $('delete-btn');
      const expandBtn       = $('expand-btn');
      const clearCacheBtn   = $('clear-cache-btn');
      const clearCacheSt    = $('clear-cache-status');
      const stopImportBtn   = $('stop-import-btn');
      const table           = $('orders-table');
      const exportBtn       = $('export-btn');
      const openBtn         = $('open-btn');
      const statusEl        = $('status');
      const metaCount       = $('meta-count');
      const metaOldest      = $('meta-oldest');
      const progressFill    = $('progress-fill');
      const progressText    = $('progress-text');
      const contabiliumBtn  = $('contabilium-btn');
      const contabiliumFile = $('contabilium-file');
      const ctbModal        = $('ctb-modal');

      const setStatus = (msg, type = '') => {
        statusEl.textContent = msg;
        statusEl.className = `status${type ? ` status--${type}` : ''}`;
      };

      // ── Sparkline ─────────────────────────────────────────────────────────

      const drawSparkline = (svgEl, values, color = '#1d4ed8') => {
        if (!values.length) return;
        const max = Math.max(...values, 1);
        const w = 200, h = 36, n = values.length;
        const pts = values.map((v, i) => {
          const x = (i / (n - 1)) * w;
          const y = h - (v / max) * (h - 4) - 2;
          return `${x},${y}`;
        }).join(' ');
        const fill = values.map((v, i) => {
          const x = (i / (n - 1)) * w;
          const y = h - (v / max) * (h - 4) - 2;
          return `${x},${y}`;
        });
        fill.push(`${w},${h}`, `0,${h}`);
        svgEl.innerHTML = `
          <defs>
            <linearGradient id="sg${svgEl.id}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${color}" stop-opacity="0.18"/>
              <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <polygon points="${fill.join(' ')}" fill="url(#sg${svgEl.id})"/>
          <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
        `;
      };

      // ── KPI calculations ─────────────────────────────────────────────────

      const updateKPIs = () => {
        const pagoIdx     = lastHeaders.indexOf('Pago');
        const fechaIdx    = lastHeaders.indexOf('Fecha Compra');
        const fechaFactIdx = lastHeaders.indexOf('Fecha Factura');
        const netoIdx     = lastHeaders.indexOf('Neto');
        const costoIdx    = lastHeaders.indexOf('Costo Envio');
        const origenIdx   = lastHeaders.indexOf('Orígen');
        const numFactIdx  = lastHeaders.indexOf('Nº Factura');
        if (pagoIdx === -1 || fechaIdx === -1) return;

        const allRows = [...lastFetchedRows, ...getManualRows(), ...getInvoiceRows()];

        const cutoff30 = new Date(NOW);
        cutoff30.setDate(cutoff30.getDate() - 29);

        // Card 1 — ML sales only
        const salesCountBuckets = new Array(30).fill(0);
        const salesNetoBuckets  = new Array(30).fill(0);
        let salesMonth = 0, salesPrevMonth = 0;
        let netoMonth  = 0, netoPrevMonth  = 0;

        // Card 2 — invoiced rows only (Nº Factura set), dated by Fecha Factura
        let factMonth = 0;

        // Card 3 — all rows, Pago basis (unchanged)
        let billedYear = 0, billedMonth = 0;

        // Pending — rows without Nº Factura
        let pendingCount = 0, pendingAmount = 0;

        const prevMonth     = CURRENT_MONTH === 0 ? 11 : CURRENT_MONTH - 1;
        const prevMonthYear = CURRENT_MONTH === 0 ? CURRENT_YEAR - 1 : CURRENT_YEAR;

        for (const row of allRows) {
          const compraDate = new Date(row[fechaIdx]);
          if (isNaN(compraDate)) continue;
          const pago   = Number(row[pagoIdx]  || 0);
          const neto   = netoIdx  !== -1 ? Number(row[netoIdx]  || 0) : 0;
          const costo  = costoIdx !== -1 ? Number(row[costoIdx] || 0) : 0;
          const origen = origenIdx !== -1 ? (row[origenIdx] ?? '') : '';
          const numFact = numFactIdx !== -1 ? (row[numFactIdx] ?? '') : '';
          const yr = compraDate.getFullYear(), mo = compraDate.getMonth();

          // Card 3: all rows
          if (yr === CURRENT_YEAR) {
            billedYear += pago;
            if (mo === CURRENT_MONTH) billedMonth += pago;
          }

          // Card 1: ML rows only
          if (origen === 'ML') {
            if (yr === CURRENT_YEAR && mo === CURRENT_MONTH) {
              salesMonth++;
              netoMonth += neto;
            }
            if (yr === prevMonthYear && mo === prevMonth) {
              salesPrevMonth++;
              netoPrevMonth += neto;
            }
            const dayOffset = Math.floor((compraDate - cutoff30) / 86400000);
            if (dayOffset >= 0 && dayOffset < 30) {
              salesCountBuckets[dayOffset]++;
              salesNetoBuckets[dayOffset] += neto;
            }
          }

          // Card 2: invoiced rows, dated by Fecha Factura
          if (numFact) {
            const factDateStr = fechaFactIdx !== -1 ? row[fechaFactIdx] : '';
            const factDate = factDateStr ? new Date(factDateStr) : compraDate;
            const fd = isNaN(factDate) ? compraDate : factDate;
            if (fd.getFullYear() === CURRENT_YEAR && fd.getMonth() === CURRENT_MONTH) {
              factMonth += neto + costo;
            }
          }

          // Pending
          if (!numFact) {
            pendingCount++;
            pendingAmount += pago;
          }
        }

        // Card 1 — Ventas
        $('kpi-sales-month').textContent = salesMonth;
        $('kpi-neto-month').textContent  = ars.format(netoMonth);

        const setDelta = (deltaId, labelId, cur, prev, prevLabel) => {
          const el = $(deltaId), lbl = $(labelId);
          if (prev > 0) {
            const pct = ((cur - prev) / prev * 100).toFixed(1);
            const up  = cur >= prev;
            el.textContent  = `${up ? '▲' : '▼'} ${Math.abs(pct)}%`;
            el.className    = `kpi-delta kpi-delta--${up ? 'up' : 'down'}`;
            lbl.textContent = `vs mes anterior (${prevLabel})`;
          } else {
            el.textContent = ''; lbl.textContent = '';
          }
        };
        setDelta('kpi-sales-delta', 'kpi-sales-delta-label', salesMonth, salesPrevMonth, salesPrevMonth);
        setDelta('kpi-neto-delta',  'kpi-neto-delta-label',  netoMonth,  netoPrevMonth,  ars.format(netoPrevMonth));

        // Card 2 — Facturado
        $('kpi-billed-month').textContent = ars.format(factMonth);
        const pendingBlock = $('kpi-pending-block');
        if (pendingCount > 0) {
          $('kpi-pending-amount').textContent = ars.format(pendingAmount);
          $('kpi-pending-count').textContent  = `${pendingCount} orden${pendingCount !== 1 ? 'es' : ''} sin facturar`;
          pendingBlock.style.display = '';
        } else {
          pendingBlock.style.display = 'none';
        }

        // Card 3 — Tax category
        const catKey     = $('tax-category').value;
        const catMax     = TAX_CATEGORIES[catKey] || TAX_CATEGORIES.H;
        const monthlyMax = catMax / 12;
        const remaining  = Math.max(0, catMax - billedYear);
        $('kpi-remaining').textContent = ars.format(remaining);

        const yearPct  = Math.min(100, (billedYear  / catMax)     * 100);
        const monthPct = Math.min(100, (billedMonth / monthlyMax) * 100);

        $('bar-year-amount').textContent  = `${yearPct.toFixed(1)}%  ·  ${ars.format(billedYear)}`;
        $('bar-month-amount').textContent = `${monthPct.toFixed(1)}%  ·  ${ars.format(billedMonth)}`;

        const yearFill  = $('bar-year-fill');
        const monthFill = $('bar-month-fill');
        yearFill.style.width  = `${yearPct}%`;
        monthFill.style.width = `${monthPct}%`;
        yearFill.className  = `kpi-bar-row__fill${yearPct  >= 90 ? ' kpi-bar-row__fill--err' : yearPct  >= 70 ? ' kpi-bar-row__fill--warn' : ''}`;
        monthFill.className = `kpi-bar-row__fill${monthPct >= 90 ? ' kpi-bar-row__fill--err' : monthPct >= 70 ? ' kpi-bar-row__fill--warn' : ''}`;

        // Sparklines — card 1 only
        drawSparkline($('spark-sales'), salesCountBuckets);
        drawSparkline($('spark-neto'),  salesNetoBuckets, '#15803d');

        // Period
        const fromEl = $('period-from');
        const toEl   = $('period-to');
        if (fromEl.value && toEl.value) {
          const from = new Date(fromEl.value);
          const to   = new Date(toEl.value + 'T23:59:59');
          let sp = 0, bp = 0;
          for (const row of allRows) {
            const d = new Date(row[fechaIdx]);
            if (isNaN(d) || d < from || d > to) continue;
            sp++;
            bp += Number(row[pagoIdx] || 0);
          }
          $('kpi-sales-period').textContent  = sp;
          $('kpi-billed-period').textContent = ars.format(bp);
        }
      };

      // ── Checked rows state ────────────────────────────────────────────────
      const checkedIds = new Set();

      const updateToolbar = () => {
        const count = checkedIds.size;
        const singleId = count === 1 ? [...checkedIds][0] : null;
        const isInvoice = singleId?.startsWith('invoice-');
        deleteBtn.disabled = count === 0;
        editBtn.disabled   = count !== 1 || isInvoice;
        editBtn.textContent = isInvoice ? '✎ No editable' : count > 1 ? '✎ No se puede editar múltiples filas' : '✎ Editar';
        deleteBtn.textContent = '✕ Eliminar';
      };

      const updateMeta = (meta) => {
        if (!meta) return;
        const pct = calcProgress(meta.oldest_date);
        metaCount.textContent  = `${meta.loaded} órdenes`;
        metaOldest.textContent = `Más antigua: ${formatDate(meta.oldest_date) || '—'}`;
        progressFill.style.width  = `${pct}%`;
        progressText.textContent  = `${pct}%`;
        if (meta.done && !importRunning) {
          importBtn.textContent = 'Historia completa ✓';
          importBtn.disabled    = true;
        }
      };

      // ── Edits state ───────────────────────────────────────────────────────
      let editsState = { manualRows: [], hiddenIds: [], mlOverrides: {}, invoiceRows: [] };

      const getManualRows   = () => editsState.manualRows;
      const getHiddenIds    = () => new Set(editsState.hiddenIds);
      const getMlOverrides  = () => editsState.mlOverrides;
      const getInvoiceRows  = () => editsState.invoiceRows || [];

      const persistEdits = () =>
        fetch('/api/edits', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(editsState),
        }).catch(() => setStatus('Error al guardar cambios.', 'err'));

      const saveManualRows  = (rows) => { editsState.manualRows  = rows; persistEdits(); };
      const saveHiddenIds   = (set)  => { editsState.hiddenIds   = [...set]; persistEdits(); };
      const saveMlOverrides = (obj)  => { editsState.mlOverrides = obj;  persistEdits(); };

      // ── Table rendering ───────────────────────────────────────────────────
      let lastHeaders = [];

      const getEstado = (row) => {
        const idx = lastHeaders.indexOf('Nº Factura');
        if (idx === -1) return null;
        const v = row[idx];
        return (!v || v === '') ? 'Pendiente' : 'Facturado';
      };

      const renderTable = ({ headers, rows }) => {
        lastHeaders = headers;

        const validIds = new Set();
        for (const r of getManualRows()) validIds.add(`manual-${r[0]}-${r[1]}`);
        for (const r of getInvoiceRows()) validIds.add(`invoice-${r[0]}`);
        const _hidden = getHiddenIds();
        for (const r of rows) { const id = String(r[0]); if (!_hidden.has(id)) validIds.add(id); }
        for (const id of [...checkedIds]) { if (!validIds.has(id)) checkedIds.delete(id); }

        table.innerHTML = '';

        const visibleCols = getVisibleCols(headers);
        const thead = document.createElement('thead');
        const headRow = document.createElement('tr');
        const checkTh = document.createElement('th');
        checkTh.className = 'check-col';
        headRow.append(checkTh);
        for (const { name: h } of visibleCols) {
          const th = document.createElement('th');
          th.textContent = h;
          if (MONEY_COLS.has(h)) th.classList.add('num');
          headRow.append(th);
        }
        thead.append(headRow);
        table.append(thead);

        const tbody    = document.createElement('tbody');
        const hiddenIds    = getHiddenIds();
        const mlOverrides  = getMlOverrides();

        const buildRow = (row, rowId, isManual) => {
          const displayRow = (!isManual && mlOverrides[rowId]) ? mlOverrides[rowId] : row;
          const tr = document.createElement('tr');
          tr.dataset.rowId = rowId;
          if (isManual) tr.classList.add('manual-row');
          if (checkedIds.has(rowId)) tr.classList.add('highlighted');

          const checkTd = document.createElement('td');
          checkTd.className = 'check-col';
          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = checkedIds.has(rowId);
          checkbox.addEventListener('change', () => {
            if (checkbox.checked) checkedIds.add(rowId);
            else checkedIds.delete(rowId);
            tr.classList.toggle('highlighted', checkbox.checked);
            updateToolbar();
          });
          checkTd.append(checkbox);
          tr.append(checkTd);

          for (const { name: h, idx } of visibleCols) {
            const td = document.createElement('td');
            if (h === 'Estado') {
              const estado = getEstado(displayRow);
              if (estado) {
                const pill = document.createElement('span');
                pill.className = `pill ${estado === 'Pendiente' ? 'pill--pending' : 'pill--ok'}`;
                pill.textContent = estado;
                td.append(pill);
              }
            } else {
              const val = displayRow[idx];
              if (DATE_COLS.has(h)) {
                td.textContent = formatDate(val);
              } else if (MONEY_COLS.has(h)) {
                td.textContent = ars.format(Number(val || 0));
                td.classList.add('num');
              } else {
                td.textContent = val ?? '';
              }
            }
            tr.append(td);
          }
          return tr;
        };

        const manualRows = getManualRows();
        if (manualRows.length === 0 && rows.length === 0) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = visibleCols.length + 1;
          td.className = 'empty';
          td.textContent = 'No hay órdenes cargadas.';
          tr.append(td);
          tbody.append(tr);
        } else {
          for (const row of manualRows) {
            tbody.append(buildRow(row, `manual-${row[0]}-${row[1]}`, true));
          }
          for (const row of getInvoiceRows()) {
            tbody.append(buildRow(row, `invoice-${row[0]}`, true));
          }
          for (const row of rows) {
            const rowId = String(row[0]);
            if (hiddenIds.has(rowId)) continue;
            tbody.append(buildRow(row, rowId, false));
          }
        }

        table.append(tbody);
        updateToolbar();
      };

      // ── Edit row builder ──────────────────────────────────────────────────
      const recalcEditRow = (inputs) => {
        const pago    = Number(inputs['Pago']?.value || 0);
        const recargo = Number(inputs['Recargo MP']?.value || 0);
        const iibb    = Number(inputs['Retencion IIBB']?.value || 0);
        const sirtac  = Number(inputs['Imp SIRTAC']?.value || 0);
        const envio   = Number(inputs['Costo Envio']?.value || 0);
        const suma = iibb + sirtac;
        const neto = pago - recargo - suma - envio;
        if (inputs['Suma Impuestos']) inputs['Suma Impuestos'].textContent = ars.format(suma);
        if (inputs['Neto'])          inputs['Neto'].textContent           = ars.format(neto);
        inputs['_sumaVal'] = suma;
        inputs['_netoVal'] = neto;
      };

      const buildEditInputs = (headers, initialValues = []) => {
        const inputs = {};
        for (const [i, h] of headers.entries()) {
          if (READONLY_COLS.has(h)) {
            const span = document.createElement('span');
            span.className = 'num';
            span.textContent = ars.format(Number(initialValues[i] ?? 0));
            inputs[h] = span;
          } else {
            const isNum = MONEY_COLS.has(h);
            const input = document.createElement('input');
            input.type = isNum ? 'number' : (DATE_COLS.has(h) ? 'date' : 'text');
            input.step = '0.01';
            input.className = `manual-input${isNum ? ' num' : ''}`;
            const val = initialValues[i];
            if (val !== undefined && val !== null && val !== '') {
              input.value = DATE_COLS.has(h) ? toDateInputVal(val) : val;
            }
            if (['Pago', 'Recargo MP', 'Retencion IIBB', 'Imp SIRTAC', 'Costo Envio'].includes(h)) {
              input.addEventListener('input', () => recalcEditRow(inputs));
            }
            inputs[h] = input;
          }
        }
        return inputs;
      };

      const buildEditRow = (headers, initialValues, onSave, onCancel) => {
        const tr = document.createElement('tr');
        tr.className = 'edit-row';

        const checkTd = document.createElement('td');
        checkTd.className = 'check-col edit-actions';
        const saveBtn   = document.createElement('button');
        saveBtn.textContent = '✓'; saveBtn.title = 'Guardar'; saveBtn.className = 'btn btn--ghost btn--xs';
        const cancelBtn = document.createElement('button');
        cancelBtn.textContent = '✗'; cancelBtn.title = 'Cancelar'; cancelBtn.className = 'btn btn--ghost btn--xs';
        cancelBtn.addEventListener('click', onCancel);
        checkTd.append(saveBtn, cancelBtn);
        tr.append(checkTd);

        const inputs = buildEditInputs(headers, initialValues);
        for (const { name: h, idx } of getVisibleCols(headers)) {
          const td = document.createElement('td');
          if (h === 'Estado') {
            td.textContent = '';
          } else {
            if (READONLY_COLS.has(h) || MONEY_COLS.has(h)) td.classList.add('num');
            td.append(inputs[h]);
          }
          tr.append(td);
        }

        saveBtn.addEventListener('click', () => {
          recalcEditRow(inputs);
          const row = headers.map((h) => {
            if (h === 'Suma Impuestos') return inputs['_sumaVal'] ?? 0;
            if (h === 'Neto')          return inputs['_netoVal'] ?? 0;
            const el  = inputs[h];
            const val = el?.value ?? '';
            return MONEY_COLS.has(h) ? Number(val || 0) : val;
          });
          onSave(row);
        });

        return { tr, inputs };
      };

      // ── Clear cache ───────────────────────────────────────────────────────
      clearCacheBtn.addEventListener('click', async () => {
        clearCacheSt.textContent = '';
        clearCacheBtn.disabled = true;
        try {
          const [cacheRes, editsRes] = await Promise.all([
            fetch('/api/orders/cache', { method: 'DELETE' }),
            fetch('/api/edits', {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ manualRows: [], hiddenIds: [], mlOverrides: {}, invoiceRows: [] }),
            }),
          ]);
          if (!cacheRes.ok || !editsRes.ok) throw new Error('Error al limpiar');
          editsState = { manualRows: [], hiddenIds: [], mlOverrides: {}, invoiceRows: [] };
          lastFetchedRows = []; lastHeaders = [];
          checkedIds.clear(); table.innerHTML = '';
          importBtn.textContent = 'Importar historial 2026'; importBtn.disabled = false;
          updateMeta({ loaded: 0, oldest_date: null });
          clearCacheSt.textContent = '✓ Caché limpiada';
        } catch (e) {
          clearCacheSt.textContent = `Error: ${e.message}`;
        } finally {
          clearCacheBtn.disabled = false;
        }
      });

      $('clear-dates-btn').addEventListener('click', async () => {
        clearCacheSt.textContent = '';
        if (!confirm('¿Limpiar datos de Contabilium del caché? Fecha Factura y Nº Factura se borrarán. Los estados volverán a Pendiente hasta reimportar.')) return;
        $('clear-dates-btn').disabled = true;
        try {
          const res = await fetch('/api/orders/clear-invoice-dates', { method: 'POST' });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Error');
          clearCacheSt.textContent = `✓ ${data.cleared} fechas eliminadas`;
          const cacheData = await fetch('/api/orders/cache').then((r) => r.json());
          if (cacheData.rows?.length) applyData(cacheData);
        } catch (e) {
          clearCacheSt.textContent = `Error: ${e.message}`;
        } finally {
          $('clear-dates-btn').disabled = false;
        }
      });

      // ── Expand / collapse columns ─────────────────────────────────────────
      expandBtn.addEventListener('click', () => {
        isExpanded = !isExpanded;
        expandBtn.textContent = isExpanded ? 'Colapsar ←' : 'Expandir →';
        table.querySelector('tr.edit-row')?.remove();
        if (lastHeaders.length) renderTable({ headers: lastHeaders, rows: lastFetchedRows });
      });

      // ── Add row ───────────────────────────────────────────────────────────
      addRowBtn.addEventListener('click', () => {
        table.querySelector('tr.edit-row')?.remove();
        if (!lastHeaders.length) { setStatus('Cargá órdenes primero.', 'err'); return; }
        const defaults = lastHeaders.map((h) => h === 'Orígen' ? 'MANUAL' : '');
        const { tr, inputs } = buildEditRow(
          lastHeaders, defaults,
          (row) => { const ex = getManualRows(); ex.unshift(row); saveManualRows(ex); tr.remove(); renderTable({ headers: lastHeaders, rows: lastFetchedRows }); },
          () => tr.remove(),
        );
        const tbody = table.querySelector('tbody') || table.appendChild(document.createElement('tbody'));
        tbody.insertBefore(tr, tbody.firstChild);
        inputs[lastHeaders[0]]?.focus?.();
      });

      // ── Edit selected row ─────────────────────────────────────────────────
      editBtn.addEventListener('click', () => {
        if (checkedIds.size !== 1) return;
        const [rowId] = checkedIds;
        const isManual = rowId.startsWith('manual-');
        if (!isManual && !confirm('Estás por editar una fila cuyos datos se originaron en Mercado Libre. ¿Continuar?')) return;
        const targetTr = [...table.querySelectorAll('tr[data-row-id]')].find((tr) => tr.dataset.rowId === rowId);
        if (!targetTr) return;
        let currentValues;
        if (isManual) {
          currentValues = getManualRows().find((r) => `manual-${r[0]}-${r[1]}` === rowId) || [];
        } else {
          const ov = getMlOverrides();
          currentValues = ov[rowId] || lastFetchedRows.find((r) => String(r[0]) === rowId) || [];
        }
        table.querySelector('tr.edit-row')?.remove();
        const { tr: editTr, inputs } = buildEditRow(
          lastHeaders, currentValues,
          (row) => {
            if (isManual) {
              const rows = getManualRows(); const idx = rows.findIndex((r) => `manual-${r[0]}-${r[1]}` === rowId);
              if (idx !== -1) { rows[idx] = row; saveManualRows(rows); }
            } else { const ov = getMlOverrides(); ov[rowId] = row; saveMlOverrides(ov); }
            checkedIds.delete(rowId); updateToolbar();
            renderTable({ headers: lastHeaders, rows: lastFetchedRows });
          },
          () => editTr.remove(),
        );
        targetTr.replaceWith(editTr);
        inputs[lastHeaders[0]]?.focus?.();
      });

      // ── Delete selected rows ──────────────────────────────────────────────
      deleteBtn.addEventListener('click', () => {
        const count = checkedIds.size;
        if (!confirm(`¿Eliminar ${count} fila${count !== 1 ? 's' : ''}? Esta acción no se puede deshacer.`)) return;
        const hiddenIds = getHiddenIds();
        let manualRows = getManualRows();
        let invoiceRows = getInvoiceRows();
        for (const rowId of checkedIds) {
          if (rowId.startsWith('manual-')) manualRows = manualRows.filter((r) => `manual-${r[0]}-${r[1]}` !== rowId);
          else if (rowId.startsWith('invoice-')) { const k = rowId.slice('invoice-'.length); invoiceRows = invoiceRows.filter((r) => String(r[0]) !== k); }
          else hiddenIds.add(rowId);
        }
        editsState.invoiceRows = invoiceRows;
        saveManualRows(manualRows); saveHiddenIds(hiddenIds);
        checkedIds.clear(); updateToolbar();
        renderTable({ headers: lastHeaders, rows: lastFetchedRows });
      });

      let lastFetchedRows = [];

      // ── Enrichment pass ───────────────────────────────────────────────────
      const enrichExtra = async () => {
        let done = false;
        while (!done) {
          try {
            const res = await fetch('/api/orders/enrich-extra', {});
            if (!res.ok) break;
            const data = await res.json();
            applyData(data); done = data.enrichDone;
          } catch { break; }
        }
      };

      // ── Data loading ──────────────────────────────────────────────────────
      const applyData = (data) => {
        lastFetchedRows = data.rows || [];
        if (data.sheet_url) SHEET_URL = data.sheet_url;
        renderTable(data);
        exportBtn.disabled = false; openBtn.disabled = false;
        updateMeta(data.meta);
        updateKPIs();
      };

      const loadFromCache = async () => {
        try {
          const [cacheData, editsData] = await Promise.all([
            fetch('/api/orders/cache', {}).then((r) => r.json()),
            fetch('/api/edits',        {}).then((r) => r.json()),
          ]);
          editsState.manualRows  = editsData.manualRows  || [];
          editsState.hiddenIds   = editsData.hiddenIds   || [];
          editsState.mlOverrides = editsData.mlOverrides || {};
          editsState.invoiceRows = editsData.invoiceRows || [];
          if (cacheData.rows?.length) { applyData(cacheData); await enrichExtra(); }
        } catch {}
      };

      loadFromCache();

      fetchBtn.addEventListener('click', async () => {
        fetchBtn.disabled = true; fetchLbl.textContent = 'Fetching…'; setStatus('Loading orders…');
        try {
          const res  = await fetch('/api/orders/recent', {});
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Request failed.');
          applyData(data);
          const n = data.meta?.loaded ?? data.rows.length;
          setStatus(`${n} order${n !== 1 ? 's' : ''} loaded.`, 'ok');
          await enrichExtra();
        } catch (err) { setStatus(err.message, 'err'); }
        finally { fetchBtn.disabled = false; fetchLbl.textContent = '+ Cargar pedidos'; }
      });

      let importRunning = false, importCompletedNaturally = false;

      const stopImport = () => {
        importRunning = false; stopImportBtn.disabled = true;
        importBtn.textContent = 'Importar historial 2026';
      };

      stopImportBtn.addEventListener('click', () => {
        if (importRunning) { stopImport(); setStatus('Importación detenida.'); }
      });

      importBtn.addEventListener('click', async () => {
        if (importRunning) { stopImport(); setStatus('Importación detenida.'); return; }
        importRunning = true; importCompletedNaturally = false;
        stopImportBtn.disabled = false; importBtn.textContent = 'Detener ✕';
        setStatus('Importando historial…');
        while (importRunning) {
          try {
            const res  = await fetch('/api/orders/older', {});
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Error loading older orders.');
            applyData(data);
            setStatus(`Importando… ${data.meta.loaded} órdenes — más antigua: ${formatDate(data.meta.oldest_date)}`);
            if (data.meta.done) { importCompletedNaturally = true; importRunning = false; break; }
            await new Promise((r) => setTimeout(r, 2000));
          } catch (err) { setStatus(err.message, 'err'); importRunning = false; break; }
        }
        stopImportBtn.disabled = true; importBtn.textContent = 'Importar historial 2026';
        if (importCompletedNaturally) {
          setStatus('Enriqueciendo datos adicionales…');
          await enrichExtra();
          setStatus('Historia importada hasta 01/01/2026.', 'ok');
        }
      });

      exportBtn.addEventListener('click', async () => {
        exportBtn.disabled = true; setStatus('Appending new entries to Google Sheet…');
        try {
          const res  = await fetch('/api/orders/export', { method: 'POST' });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Export failed.');
          setStatus(`Appended ${data.exported_rows} new rows. ${data.skipped_existing} already present.`, 'ok');
        } catch (err) { setStatus(err.message, 'err'); }
        finally { exportBtn.disabled = false; }
      });

      openBtn.addEventListener('click', () => window.open(SHEET_URL, '_blank'));
      $('auth-btn').addEventListener('click', () => { window.location.href = '/api/meli/login'; });

      $('period-from').addEventListener('change', updateKPIs);
      $('period-to').addEventListener('change', updateKPIs);
      $('tax-category').addEventListener('change', updateKPIs);

      // ── Contabilium XLSX parser ───────────────────────────────────────────

      async function parseContabiliumXlsx(file) {
        if (!window.JSZip) throw new Error('JSZip no disponible. Recargá la página e intentá de nuevo.');
        const zip = await JSZip.loadAsync(await file.arrayBuffer());

        const parseXml = (text) => new DOMParser().parseFromString(text, 'application/xml');

        const byNS = (el, tag) => [...el.getElementsByTagNameNS('*', tag)];

        const ssText = await zip.file('xl/sharedStrings.xml')?.async('text') ?? '<sst/>';
        const ssDoc  = parseXml(ssText);
        const sharedStrings = byNS(ssDoc, 'si').map((si) =>
          byNS(si, 't').map((t) => t.textContent).join(''),
        );

        const wsText = await zip.file('xl/worksheets/sheet1.xml')?.async('text');
        if (!wsText) throw new Error('No se encontró la hoja de datos en el archivo.');
        const wsDoc  = parseXml(wsText);
        const rowEls = byNS(wsDoc, 'row');
        if (rowEls.length < 2) throw new Error('El archivo no contiene filas de datos.');

        const getCellVal = (cellEl) => {
          const t = cellEl.getAttribute('t');
          const vEl = byNS(cellEl, 'v')[0];
          if (!vEl) return '';
          if (t === 's') return sharedStrings[+vEl.textContent] ?? '';
          if (t === 'inlineStr') return byNS(cellEl, 't').map((n) => n.textContent).join('');
          return vEl.textContent;
        };

        const colLetter = (ref) => ref.replace(/\d+$/, '');

        // Header row → column-letter-to-name map
        const colByName = {};
        for (const cell of byNS(rowEls[0], 'c')) {
          const name = getCellVal(cell);
          if (name) colByName[name] = colLetter(cell.getAttribute('r'));
        }
        const getCell = (cellMap, header) => cellMap[colByName[header]] ?? '';

        // Group rows by invoice Numero (one invoice can span multiple product lines)
        const byNumero = new Map();
        let skippedNC = 0;

        for (const rowEl of rowEls.slice(1)) {
          const cellMap = {};
          for (const cell of byNS(rowEl, 'c')) {
            cellMap[colLetter(cell.getAttribute('r'))] = getCellVal(cell);
          }
          const tipo = getCell(cellMap, 'Tipo');
          if (tipo === 'NC') { skippedNC++; continue; }
          const numero = getCell(cellMap, 'Numero');
          if (!numero || byNumero.has(numero)) continue; // keep first line per invoice
          byNumero.set(numero, cellMap);
        }

        const mlMatches   = {};
        const invoiceRows = [];

        for (const [numero, cells] of byNumero) {
          const integracion = getCell(cells, 'Integracion');
          const idVenta     = getCell(cells, 'ID Venta Integracion');
          const fechaRaw    = getCell(cells, 'Fecha'); // DD/MM/YYYY
          const [dd, mm, yyyy] = fechaRaw.split('/');
          const fecha = `${yyyy}-${mm}-${dd}`;

          if (integracion === 'MercadoLibre' && idVenta) {
            mlMatches[idVenta] = { numero, fecha };
          } else {
            const razonSocial = getCell(cells, 'Razon Social');
            const totalFact   = parseFloat(getCell(cells, 'Total Fact') || '0');
            const provincia   = getCell(cells, 'Provincia');
            const ciudad      = getCell(cells, 'Ciudad');
            const origen      = integracion || 'DIRECTO';
            // Row shape must match OUTPUT_HEADERS order exactly
            invoiceRows.push([
              numero, fecha, razonSocial,
              totalFact, 0, 0, 0, 0, 0, 0, totalFact,
              ciudad, provincia, origen, fecha, numero,
            ]);
          }
        }

        return { mlMatches, invoiceRows, skippedNC, totalInvoices: byNumero.size };
      }

      // ── Contabilium modal ─────────────────────────────────────────────────

      let ctbPendingPayload = null;

      const showCtbModal = (mlMatches, invoiceRows, skippedNC, fileName) => {
        const numFactIdx = lastHeaders.indexOf('Nº Factura');
        const byOrdId    = new Map(lastFetchedRows.map((r) => [String(r[0]), r]));

        const fresh = [], overwrites = [], unmatched = [];
        for (const [idVenta, { numero }] of Object.entries(mlMatches)) {
          const existing = byOrdId.get(idVenta);
          if (!existing) { unmatched.push(idVenta); continue; }
          const cur = numFactIdx !== -1 ? existing[numFactIdx] : '';
          if (cur && cur !== numero) overwrites.push({ ordId: idVenta, old: cur, new: numero });
          else fresh.push(idVenta);
        }

        const mlTotal   = Object.keys(mlMatches).length;
        const nonMlTotal = invoiceRows.length;

        let html = `<p style="font-size:.8rem;color:var(--ink-2);margin:0 0 1rem">
          Archivo: <strong>${fileName}</strong>
        </p><div style="display:flex;flex-direction:column;gap:.6rem">`;

        if (mlTotal > 0) {
          html += `<div style="font-size:.8rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
            <span class="pill pill--ok">✓ ${fresh.length + overwrites.length} facturas ML</span>
            ${unmatched.length ? `<span style="color:var(--ink-3)">(${unmatched.length} no están en el caché aún)</span>` : ''}
          </div>`;
        }

        if (overwrites.length) {
          const detail = overwrites.map((o) => `
            <div style="font-size:.75rem;padding:.5rem;background:var(--cream);border-radius:.25rem;margin-top:.25rem">
              Orden ${o.ordId}<br>
              <span style="color:var(--ink-3)">Nº actual:&nbsp; ${o.old}</span><br>
              <span style="color:var(--ink);font-weight:600">Nº nuevo:&nbsp;&nbsp;${o.new}</span>
            </div>`).join('');
          html += `<details style="font-size:.8rem">
            <summary style="cursor:pointer;color:#92400e;font-weight:600">
              ⚠ ${overwrites.length} sobrescriben un valor distinto — ver detalle
            </summary>${detail}
          </details>`;
        }

        if (nonMlTotal > 0) {
          html += `<div style="font-size:.8rem">
            <span class="pill pill--pending">+ ${nonMlTotal} facturas no-ML</span>
          </div>`;
        }

        if (skippedNC > 0) {
          html += `<div style="font-size:.75rem;color:var(--ink-3)">✕ ${skippedNC} notas de crédito omitidas</div>`;
        }

        if (mlTotal === 0 && nonMlTotal === 0) {
          html += `<p style="font-size:.8rem;color:var(--err)">No se encontraron facturas en el archivo.</p>`;
        }

        html += '</div>';

        $('ctb-modal-body').innerHTML = html;
        ctbPendingPayload = mlTotal + nonMlTotal > 0 ? { mlMatches, invoiceRows } : null;
        $('ctb-confirm').disabled = !ctbPendingPayload;
        ctbModal.style.display = 'flex';
      };

      $('ctb-cancel').addEventListener('click', () => { ctbModal.style.display = 'none'; ctbPendingPayload = null; });

      $('ctb-confirm').addEventListener('click', async () => {
        if (!ctbPendingPayload) return;
        ctbModal.style.display = 'none';
        setStatus('Importando datos de Contabilium…');
        $('ctb-confirm').disabled = true;
        try {
          const res  = await fetch('/api/invoices/import', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(ctbPendingPayload),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Error al importar');

          // Reload both cache and edits to reflect changes
          const [cacheData, editsData] = await Promise.all([
            fetch('/api/orders/cache').then((r) => r.json()),
            fetch('/api/edits').then((r) => r.json()),
          ]);
          editsState.manualRows  = editsData.manualRows  || [];
          editsState.hiddenIds   = editsData.hiddenIds   || [];
          editsState.mlOverrides = editsData.mlOverrides || {};
          editsState.invoiceRows = editsData.invoiceRows || [];
          if (cacheData.rows?.length) applyData(cacheData);

          const parts = [];
          if (data.ml_updated)      parts.push(`${data.ml_updated} órdenes ML enriquecidas`);
          if (data.ml_overwritten)  parts.push(`${data.ml_overwritten} sobrescritura${data.ml_overwritten !== 1 ? 's' : ''}`);
          if (data.invoices_added)  parts.push(`${data.invoices_added} facturas nuevas`);
          if (data.invoices_replaced) parts.push(`${data.invoices_replaced} facturas actualizadas`);
          setStatus(parts.length ? parts.join(' · ') : 'Sin cambios.', 'ok');
        } catch (err) {
          setStatus(`Error: ${err.message}`, 'err');
        } finally {
          $('ctb-confirm').disabled = false;
          ctbPendingPayload = null;
        }
      });

      contabiliumBtn.addEventListener('click', () => contabiliumFile.click());

      contabiliumFile.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        contabiliumFile.value = '';
        if (!file) return;
        contabiliumBtn.disabled = true;
        setStatus('Procesando archivo…');
        try {
          const { mlMatches, invoiceRows, skippedNC } = await parseContabiliumXlsx(file);
          setStatus('');
          showCtbModal(mlMatches, invoiceRows, skippedNC, file.name);
        } catch (err) {
          setStatus(`Error al procesar archivo: ${err.message}`, 'err');
        } finally {
          contabiliumBtn.disabled = false;
        }
      });

      (async () => {
        try {
          const res = await fetch('/cdn-cgi/access/get-identity', { credentials: 'include' });
          if (res.ok) {
            const { email } = await res.json();
            $('header-user').textContent = `Hola, ${email.split('@')[0]}`;
          }
        } catch {}
      })();
    </script>
  </body>
</html>
