<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pignus — Facturación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://ui.pignuslabs.com.ar/pignus.css">
  </head>
  <body>
    <header class="header">
      <div class="header__brand">
        <img src="/PignusLabs_Logo.png" alt="Pignus Labs" class="header__logo">
        <span class="header__title">Facturación</span>
      </div>
      <span class="header__user" id="header-user"></span>
    </header>

    <div class="app-shell app-shell--fluid">
      <aside class="sidebar">
        <div class="sidebar__section">
          <div class="sidebar__section-title">Módulos</div>
          <ul class="sidebar__list">
            <li class="sidebar__item"><a href="https://pignuslabs.com.ar/">Portal</a></li>
            <li class="sidebar__item sidebar__item--active"><a href="#">Facturación</a></li>
            <li class="sidebar__item"><a href="https://inversiones.pignuslabs.com.ar/">Inversiones</a></li>
          </ul>
        </div>
      </aside>

      <div style="min-width:0">
        <div class="main">

          <div class="toolbar">
            <div class="toolbar-left">
              <button id="add-row-btn" type="button" class="btn btn--primary">+ Agregar fila</button>
              <button id="edit-btn" type="button" class="btn btn--ghost" disabled>✎ Editar</button>
              <button id="delete-btn" type="button" class="btn btn--ghost btn--danger" disabled>✕ Eliminar</button>
            </div>
            <p id="status" class="status" aria-live="polite"></p>
            <div class="toolbar-right">
              <button id="fetch-btn" type="button" class="btn btn--primary">
                <span id="fetch-label">+ Cargar últimos pedidos</span>
              </button>
              <button id="export-btn" type="button" class="btn btn--secondary" disabled>Añadir a Sheets</button>
              <button id="open-btn" type="button" class="btn btn--secondary" disabled>↗ Abrir Sheets</button>
            </div>
          </div>

          <div class="kpi-panel">
            <div class="kpi-grid">
              <div class="kpi-card">
                <span class="kpi-label">Ventas este mes</span>
                <span class="kpi-value" id="kpi-sales-month">—</span>
              </div>
              <div class="kpi-card">
                <span class="kpi-label">Facturado este mes</span>
                <span class="kpi-value" id="kpi-billed-month">—</span>
              </div>
              <div class="kpi-card">
                <span class="kpi-label">Facturado este año</span>
                <span class="kpi-value" id="kpi-billed-year">—</span>
              </div>
              <div class="kpi-card">
                <span class="kpi-label">Restante en categoría</span>
                <span class="kpi-value" id="kpi-remaining">—</span>
              </div>
            </div>

            <div class="kpi-row">
              <span class="kpi-row-label">Período</span>
              <div class="kpi-period-inputs">
                <input type="date" id="period-from" class="manual-input">
                <span class="kpi-period-sep">—</span>
                <input type="date" id="period-to" class="manual-input">
              </div>
              <div class="kpi-row-results">
                <div class="kpi-inline">
                  <span class="kpi-label">Ventas</span>
                  <span class="kpi-value" id="kpi-sales-period">—</span>
                </div>
                <div class="kpi-inline">
                  <span class="kpi-label">Facturado</span>
                  <span class="kpi-value" id="kpi-billed-period">—</span>
                </div>
              </div>
            </div>

            <div class="kpi-row">
              <span class="kpi-row-label">Categoría fiscal</span>
              <select id="tax-category" class="manual-input">
                <option value="A">Cat. A — máx $6.800.000</option>
                <option value="B">Cat. B — máx $10.200.000</option>
                <option value="C">Cat. C — máx $14.400.000</option>
                <option value="D">Cat. D — máx $20.200.000</option>
                <option value="E">Cat. E — máx $28.500.000</option>
                <option value="F">Cat. F — máx $40.000.000</option>
                <option value="G">Cat. G — máx $51.000.000</option>
                <option value="H" selected>Cat. H — máx $61.344.853</option>
                <option value="J">Cat. J — máx $76.500.000</option>
                <option value="K">Cat. K — máx $94.805.682</option>
              </select>
              <div class="kpi-tax-progress">
                <div class="progress-bar">
                  <div class="progress-bar__fill" id="tax-fill" style="width:0%"></div>
                </div>
                <span class="kpi-tax-pct" id="tax-pct">0%</span>
              </div>
            </div>
          </div>

          <section id="table-section">
            <div class="table-wrap">
              <table id="orders-table" class="orders-table"></table>
            </div>
          </section>

          <div class="meta-bar" id="meta-bar">
            <button id="import-btn" type="button" class="btn btn--secondary">Importar historial 2026</button>
            <button id="stop-import-btn" type="button" class="btn btn--danger" disabled>⏹ Detener</button>
            <span class="meta-sep">·</span>
            <span id="meta-count">—</span>
            <span class="meta-sep">·</span>
            <span id="meta-oldest">Más antigua: —</span>
            <span class="meta-sep">·</span>
            <div class="progress-wrap">
              <div class="progress-bar"><div class="progress-bar__fill" id="progress-fill" style="width:0%"></div></div>
              <span id="progress-text">0%</span>
              <span class="progress-label">de 2026</span>
            </div>
            <button id="expand-btn" type="button" class="btn btn--ghost btn--expand">Expandir →</button>
          </div>

          <details class="debug-section">
            <summary>Aux Debug Tools</summary>
            <div class="debug-body">
              <button id="clear-cache-btn" type="button" class="btn btn--danger">✕ Limpiar caché</button>
              <span id="clear-cache-status" class="debug-status"></span>
            </div>
          </details>

          <div hidden id="auth-section" style="margin-top:1rem">
            <button id="auth-btn" type="button" class="btn btn--ghost">Re-authorize ML ↗</button>
          </div>
        </div>

        <footer class="footer">
          <p>Hecho por Javi con ☕ &amp; ✨ en 2026</p>
        </footer>
      </div>
    </div>

    <script>
      let SHEET_URL = null;
      const HISTORY_CUTOFF = new Date('2026-01-01T00:00:00');
      const MONEY_COLS = new Set(['Pago', 'Recargo MP', 'Retencion IIBB', 'Imp SIRTAC', 'Suma Impuestos', 'Costo Envio', 'Neto', 'Cupón']);
      const READONLY_COLS = new Set(['Suma Impuestos', 'Neto']);
      const DATE_COLS = new Set(['Fecha Compra', 'Fecha Factura']);

      const COLLAPSED_COLS = ['Nombre', 'Fecha Factura', 'Pago', 'Cupón', 'Suma Impuestos', 'Costo Envio', 'Neto', 'Provincia'];
      const EXPANDED_COLS  = ['Orden ID', 'Nombre', 'Fecha Compra', 'Fecha Factura', 'Pago', 'Cupón', 'Retencion IIBB', 'Imp SIRTAC', 'Suma Impuestos', 'Costo Envio', 'Neto', 'Provincia', 'Localidad', 'Orígen'];

      const TAX_CATEGORIES = {
        A: 6_800_000,
        B: 10_200_000,
        C: 14_400_000,
        D: 20_200_000,
        E: 28_500_000,
        F: 40_000_000,
        G: 51_000_000,
        H: 61_344_853,
        J: 76_500_000,
        K: 94_805_682,
      };

      const NOW = new Date();
      const CURRENT_MONTH = NOW.getMonth();
      const CURRENT_YEAR  = NOW.getFullYear();

      let isExpanded = false;
      const getVisibleCols = (headers) => (isExpanded ? EXPANDED_COLS : COLLAPSED_COLS)
        .map((name) => ({ name, idx: headers.indexOf(name) }))
        .filter(({ idx }) => idx !== -1);

      const ars = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' });

      const formatDate = (val) => {
        if (!val) return '';
        const d = new Date(val);
        if (Number.isNaN(d.getTime())) return val;
        return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
      };

      const toDateInputVal = (val) => {
        if (!val) return '';
        const d = new Date(val);
        return Number.isNaN(d.getTime()) ? '' : d.toISOString().slice(0, 10);
      };

      const calcProgress = (oldestDateStr) => {
        if (!oldestDateStr) return 0;
        const oldest = new Date(oldestDateStr);
        const now = new Date();
        return Math.min(100, Math.max(0, Math.round(((now - oldest) / (now - HISTORY_CUTOFF)) * 100)));
      };

      const $ = (id) => document.getElementById(id);

      const fetchBtn      = $('fetch-btn');
      const fetchLbl      = $('fetch-label');
      const importBtn     = $('import-btn');
      const addRowBtn     = $('add-row-btn');
      const editBtn       = $('edit-btn');
      const deleteBtn     = $('delete-btn');
      const expandBtn     = $('expand-btn');
      const clearCacheBtn  = $('clear-cache-btn');
      const clearCacheSt   = $('clear-cache-status');
      const stopImportBtn  = $('stop-import-btn');
      const table     = $('orders-table');
      const exportBtn     = $('export-btn');
      const openBtn       = $('open-btn');
      const statusEl      = $('status');
      const metaCount     = $('meta-count');
      const metaOldest    = $('meta-oldest');
      const progressFill  = $('progress-fill');
      const progressText  = $('progress-text');

      const setStatus = (msg, type = '') => {
        statusEl.textContent = msg;
        statusEl.className = `status${type ? ` status--${type}` : ''}`;
      };

      // ── KPI calculations ─────────────────────────────────────────────────────

      const updateKPIs = () => {
        const pagoIdx    = lastHeaders.indexOf('Pago');
        const fechaIdx   = lastHeaders.indexOf('Fecha Compra');
        if (pagoIdx === -1 || fechaIdx === -1) return;

        const allRows = [...lastFetchedRows, ...getManualRows()];

        let salesMonth = 0, billedMonth = 0, billedYear = 0;
        for (const row of allRows) {
          const d = new Date(row[fechaIdx]);
          if (isNaN(d)) continue;
          const pago = Number(row[pagoIdx] || 0);
          if (d.getFullYear() === CURRENT_YEAR) {
            billedYear += pago;
            if (d.getMonth() === CURRENT_MONTH) {
              salesMonth++;
              billedMonth += pago;
            }
          }
        }

        $('kpi-sales-month').textContent  = salesMonth;
        $('kpi-billed-month').textContent = ars.format(billedMonth);
        $('kpi-billed-year').textContent  = ars.format(billedYear);

        const catKey     = $('tax-category').value;
        const catMax     = TAX_CATEGORIES[catKey] || TAX_CATEGORIES.H;
        const remaining  = Math.max(0, catMax - billedYear);
        const pct        = Math.min(100, (billedYear / catMax) * 100);

        const remainingEl = $('kpi-remaining');
        remainingEl.textContent = ars.format(remaining);
        remainingEl.className   = `kpi-value${pct >= 90 ? ' kpi-value--err' : pct >= 70 ? ' kpi-value--warn' : ''}`;

        $('tax-fill').style.width = `${pct}%`;
        $('tax-pct').textContent  = `${pct.toFixed(1)}%`;

        const fromEl = $('period-from');
        const toEl   = $('period-to');
        if (fromEl.value && toEl.value) {
          const from = new Date(fromEl.value);
          const to   = new Date(toEl.value + 'T23:59:59');
          let salesPeriod = 0, billedPeriod = 0;
          for (const row of allRows) {
            const d = new Date(row[fechaIdx]);
            if (isNaN(d) || d < from || d > to) continue;
            salesPeriod++;
            billedPeriod += Number(row[pagoIdx] || 0);
          }
          $('kpi-sales-period').textContent  = salesPeriod;
          $('kpi-billed-period').textContent = ars.format(billedPeriod);
        }
      };

      // ── Checked rows state (survives re-renders) ──────────────────────────
      const checkedIds = new Set();

      // ── Toolbar selection buttons ─────────────────────────────────────────
      const updateToolbar = () => {
        const count = checkedIds.size;
        deleteBtn.disabled = count === 0;
        editBtn.disabled = count !== 1;
        editBtn.textContent = count > 1 ? '✎ No se puede editar múltiples filas' : '✎ Editar';
        deleteBtn.textContent = '✕ Eliminar';
      };

      const updateMeta = (meta) => {
        if (!meta) return;
        const pct = calcProgress(meta.oldest_date);
        metaCount.textContent = `${meta.loaded} órdenes`;
        metaOldest.textContent = `Más antigua: ${formatDate(meta.oldest_date) || '—'}`;
        progressFill.style.width = `${pct}%`;
        progressText.textContent = `${pct}%`;
        if (meta.done && !importRunning) {
          importBtn.textContent = 'Historia completa ✓';
          importBtn.disabled = true;
        }
      };

      // ── Edits state — in-memory mirror of KV "edits" key ─────────────────
      let editsState = { manualRows: [], hiddenIds: [], mlOverrides: {} };

      const getManualRows  = () => editsState.manualRows;
      const getHiddenIds   = () => new Set(editsState.hiddenIds);
      const getMlOverrides = () => editsState.mlOverrides;

      const persistEdits = () =>
        fetch('/api/edits', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(editsState),
        }).catch(() => setStatus('Error al guardar cambios.', 'err'));

      const saveManualRows = (rows) => { editsState.manualRows = rows; persistEdits(); };
      const saveHiddenIds  = (set)  => { editsState.hiddenIds  = [...set]; persistEdits(); };
      const saveMlOverrides = (obj) => { editsState.mlOverrides = obj; persistEdits(); };

      // ── Table rendering ───────────────────────────────────────────────────
      let lastHeaders = [];

      const renderTable = ({ headers, rows }) => {
        lastHeaders = headers;

        const validIds = new Set();
        for (const r of getManualRows()) validIds.add(`manual-${r[0]}-${r[1]}`);
        const _hidden = getHiddenIds();
        for (const r of rows) { const id = String(r[0]); if (!_hidden.has(id)) validIds.add(id); }
        for (const id of [...checkedIds]) { if (!validIds.has(id)) checkedIds.delete(id); }

        table.innerHTML = '';

        const visibleCols = getVisibleCols(headers);
        const thead = document.createElement('thead');
        const headRow = document.createElement('tr');
        const checkTh = document.createElement('th');
        checkTh.className = 'check-col';
        headRow.append(checkTh);
        for (const { name: h } of visibleCols) {
          const th = document.createElement('th');
          th.textContent = h;
          if (MONEY_COLS.has(h)) th.classList.add('num');
          headRow.append(th);
        }
        thead.append(headRow);
        table.append(thead);

        const tbody = document.createElement('tbody');
        const hiddenIds = getHiddenIds();
        const mlOverrides = getMlOverrides();

        const buildRow = (row, rowId, isManual) => {
          const displayRow = (!isManual && mlOverrides[rowId]) ? mlOverrides[rowId] : row;
          const tr = document.createElement('tr');
          tr.dataset.rowId = rowId;
          if (isManual) tr.classList.add('manual-row');
          if (checkedIds.has(rowId)) tr.classList.add('highlighted');

          const checkTd = document.createElement('td');
          checkTd.className = 'check-col';
          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = checkedIds.has(rowId);
          checkbox.addEventListener('change', () => {
            if (checkbox.checked) checkedIds.add(rowId);
            else checkedIds.delete(rowId);
            tr.classList.toggle('highlighted', checkbox.checked);
            updateToolbar();
          });
          checkTd.append(checkbox);
          tr.append(checkTd);

          for (const { name: h, idx } of visibleCols) {
            const val = displayRow[idx];
            const td = document.createElement('td');
            if (DATE_COLS.has(h)) {
              td.textContent = formatDate(val);
            } else if (MONEY_COLS.has(h)) {
              td.textContent = ars.format(Number(val || 0));
              td.classList.add('num');
            } else {
              td.textContent = val ?? '';
            }
            tr.append(td);
          }
          return tr;
        };

        const manualRows = getManualRows();
        if (manualRows.length === 0 && rows.length === 0) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = visibleCols.length + 1;
          td.className = 'empty';
          td.textContent = 'No orders found.';
          tr.append(td);
          tbody.append(tr);
        } else {
          for (const row of manualRows) {
            tbody.append(buildRow(row, `manual-${row[0]}-${row[1]}`, true));
          }
          for (const row of rows) {
            const rowId = String(row[0]);
            if (hiddenIds.has(rowId)) continue;
            tbody.append(buildRow(row, rowId, false));
          }
        }

        table.append(tbody);
        updateToolbar();
      };

      // ── Shared edit-row builder ───────────────────────────────────────────
      const recalcEditRow = (inputs) => {
        const pago    = Number(inputs['Pago']?.value || 0);
        const recargo = Number(inputs['Recargo MP']?.value || 0);
        const iibb    = Number(inputs['Retencion IIBB']?.value || 0);
        const sirtac  = Number(inputs['Imp SIRTAC']?.value || 0);
        const envio   = Number(inputs['Costo Envio']?.value || 0);
        const suma = iibb + sirtac;
        const neto = pago - recargo - suma - envio;
        if (inputs['Suma Impuestos']) inputs['Suma Impuestos'].textContent = ars.format(suma);
        if (inputs['Neto'])          inputs['Neto'].textContent          = ars.format(neto);
        inputs['_sumaVal'] = suma;
        inputs['_netoVal'] = neto;
      };

      const buildEditInputs = (headers, initialValues = []) => {
        const inputs = {};
        for (const [i, h] of headers.entries()) {
          if (READONLY_COLS.has(h)) {
            const span = document.createElement('span');
            span.className = 'num';
            span.textContent = ars.format(Number(initialValues[i] ?? 0));
            inputs[h] = span;
          } else {
            const isNum = MONEY_COLS.has(h);
            const input = document.createElement('input');
            input.type = isNum ? 'number' : (DATE_COLS.has(h) ? 'date' : 'text');
            input.step = '0.01';
            input.className = `manual-input${isNum ? ' num' : ''}`;
            const val = initialValues[i];
            if (val !== undefined && val !== null && val !== '') {
              input.value = DATE_COLS.has(h) ? toDateInputVal(val) : val;
            }
            if (['Pago', 'Recargo MP', 'Retencion IIBB', 'Imp SIRTAC', 'Costo Envio'].includes(h)) {
              input.addEventListener('input', () => recalcEditRow(inputs));
            }
            inputs[h] = input;
          }
        }
        return inputs;
      };

      const buildEditRow = (headers, initialValues, onSave, onCancel) => {
        const tr = document.createElement('tr');
        tr.className = 'edit-row';

        const checkTd = document.createElement('td');
        checkTd.className = 'check-col edit-actions';
        const saveBtn = document.createElement('button');
        saveBtn.textContent = '✓';
        saveBtn.title = 'Guardar';
        saveBtn.className = 'btn btn--ghost btn--xs';
        const cancelBtn = document.createElement('button');
        cancelBtn.textContent = '✗';
        cancelBtn.title = 'Cancelar';
        cancelBtn.className = 'btn btn--ghost btn--xs';
        cancelBtn.addEventListener('click', onCancel);
        checkTd.append(saveBtn, cancelBtn);
        tr.append(checkTd);

        const inputs = buildEditInputs(headers, initialValues);
        for (const { name: h } of getVisibleCols(headers)) {
          const td = document.createElement('td');
          if (READONLY_COLS.has(h) || MONEY_COLS.has(h)) td.classList.add('num');
          td.append(inputs[h]);
          tr.append(td);
        }

        saveBtn.addEventListener('click', () => {
          recalcEditRow(inputs);
          const row = headers.map((h) => {
            if (h === 'Suma Impuestos') return inputs['_sumaVal'] ?? 0;
            if (h === 'Neto')          return inputs['_netoVal'] ?? 0;
            const el = inputs[h];
            const val = el?.value ?? '';
            return MONEY_COLS.has(h) ? Number(val || 0) : val;
          });
          onSave(row);
        });

        return { tr, inputs };
      };

      // ── Clear cache ───────────────────────────────────────────────────────
      clearCacheBtn.addEventListener('click', async () => {
        clearCacheSt.textContent = '';
        clearCacheBtn.disabled = true;
        try {
          const [cacheRes, editsRes] = await Promise.all([
            fetch('/api/orders/cache', { method: 'DELETE' }),
            fetch('/api/edits', {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ manualRows: [], hiddenIds: [], mlOverrides: {} }),
            }),
          ]);
          if (!cacheRes.ok || !editsRes.ok) throw new Error('Error al limpiar');
          editsState = { manualRows: [], hiddenIds: [], mlOverrides: {} };
          lastFetchedRows = [];
          lastHeaders = [];
          checkedIds.clear();
          table.innerHTML = '';
          importBtn.textContent = 'Importar historial 2026';
          importBtn.disabled = false;
          updateMeta({ loaded: 0, oldest_date: null, probe_total: 0, next_older_offset: null });
          clearCacheSt.textContent = '✓ Caché limpiada';
        } catch (e) {
          clearCacheSt.textContent = `Error: ${e.message}`;
        } finally {
          clearCacheBtn.disabled = false;
        }
      });

      // ── Expand / collapse columns ─────────────────────────────────────────
      expandBtn.addEventListener('click', () => {
        isExpanded = !isExpanded;
        expandBtn.textContent = isExpanded ? 'Colapsar ←' : 'Expandir →';
        table.querySelector('tr.edit-row')?.remove();
        if (lastHeaders.length) renderTable({ headers: lastHeaders, rows: lastFetchedRows });
      });

      // ── Add row ───────────────────────────────────────────────────────────
      addRowBtn.addEventListener('click', () => {
        table.querySelector('tr.edit-row')?.remove();
        const headers = lastHeaders;
        if (!headers.length) { setStatus('Cargá órdenes primero.', 'err'); return; }

        const defaults = headers.map((h) => h === 'Orígen' ? 'MANUAL' : '');
        const { tr, inputs } = buildEditRow(
          headers, defaults,
          (row) => {
            const existing = getManualRows();
            existing.unshift(row);
            saveManualRows(existing);
            tr.remove();
            renderTable({ headers: lastHeaders, rows: lastFetchedRows });
          },
          () => tr.remove(),
        );

        const tbody = table.querySelector('tbody') || table.appendChild(document.createElement('tbody'));
        tbody.insertBefore(tr, tbody.firstChild);
        inputs[headers[0]]?.focus?.();
      });

      // ── Edit selected row ─────────────────────────────────────────────────
      editBtn.addEventListener('click', () => {
        if (checkedIds.size !== 1) return;
        const [rowId] = checkedIds;
        const isManual = rowId.startsWith('manual-');

        if (!isManual && !confirm('Estás por editar una fila cuyos datos se originaron en Mercado Libre. ¿Continuar?')) return;

        const targetTr = [...table.querySelectorAll('tr[data-row-id]')]
          .find((tr) => tr.dataset.rowId === rowId);
        if (!targetTr) return;

        let currentValues;
        if (isManual) {
          currentValues = getManualRows().find((r) => `manual-${r[0]}-${r[1]}` === rowId) || [];
        } else {
          const overrides = getMlOverrides();
          currentValues = overrides[rowId] || lastFetchedRows.find((r) => String(r[0]) === rowId) || [];
        }

        table.querySelector('tr.edit-row')?.remove();

        const { tr: editTr, inputs } = buildEditRow(
          lastHeaders, currentValues,
          (row) => {
            if (isManual) {
              const rows = getManualRows();
              const idx = rows.findIndex((r) => `manual-${r[0]}-${r[1]}` === rowId);
              if (idx !== -1) { rows[idx] = row; saveManualRows(rows); }
            } else {
              const overrides = getMlOverrides();
              overrides[rowId] = row;
              saveMlOverrides(overrides);
            }
            checkedIds.delete(rowId);
            updateToolbar();
            renderTable({ headers: lastHeaders, rows: lastFetchedRows });
          },
          () => editTr.remove(),
        );

        targetTr.replaceWith(editTr);
        inputs[lastHeaders[0]]?.focus?.();
      });

      // ── Delete selected rows ──────────────────────────────────────────────
      deleteBtn.addEventListener('click', () => {
        const count = checkedIds.size;
        if (!confirm(`¿Eliminar ${count} fila${count !== 1 ? 's' : ''}? Esta acción no se puede deshacer.`)) return;

        const hiddenIds = getHiddenIds();
        let manualRows = getManualRows();

        for (const rowId of checkedIds) {
          if (rowId.startsWith('manual-')) {
            manualRows = manualRows.filter((r) => `manual-${r[0]}-${r[1]}` !== rowId);
          } else {
            hiddenIds.add(rowId);
          }
        }

        saveManualRows(manualRows);
        saveHiddenIds(hiddenIds);
        checkedIds.clear();
        updateToolbar();
        renderTable({ headers: lastHeaders, rows: lastFetchedRows });
      });

      let lastFetchedRows = [];

      // ── Second enrichment pass (Fecha Factura + Cupón) ───────────────────
      const enrichExtra = async () => {
        let done = false;
        while (!done) {
          try {
            const res = await fetch('/api/orders/enrich-extra', {});
            if (!res.ok) break;
            const data = await res.json();
            applyData(data);
            done = data.enrichDone;
          } catch {
            break;
          }
        }
      };

      // ── Data loading helpers ──────────────────────────────────────────────
      const applyData = (data) => {
        lastFetchedRows = data.rows || [];
        if (data.sheet_url) SHEET_URL = data.sheet_url;
        renderTable(data);
        exportBtn.disabled = false;
        openBtn.disabled = false;
        updateMeta(data.meta);
        updateKPIs();
      };

      const loadFromCache = async () => {
        try {
          const [cacheData, editsData] = await Promise.all([
            fetch('/api/orders/cache', {}).then((r) => r.json()),
            fetch('/api/edits',        {}).then((r) => r.json()),
          ]);
          editsState.manualRows  = editsData.manualRows  || [];
          editsState.hiddenIds   = editsData.hiddenIds   || [];
          editsState.mlOverrides = editsData.mlOverrides || {};
          if (cacheData.rows?.length) {
            applyData(cacheData);
            await enrichExtra();
          }
        } catch {}
      };

      loadFromCache();

      fetchBtn.addEventListener('click', async () => {
        fetchBtn.disabled = true;
        fetchLbl.textContent = 'Fetching…';
        setStatus('Loading orders…');
        try {
          const res = await fetch('/api/orders/recent', {});
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Request failed.');
          applyData(data);
          const n = data.meta?.loaded ?? data.rows.length;
          setStatus(`${n} order${n !== 1 ? 's' : ''} loaded.`, 'ok');
          await enrichExtra();
        } catch (err) {
          setStatus(err.message, 'err');
        } finally {
          fetchBtn.disabled = false;
          fetchLbl.textContent = 'Fetch last 20 orders';
        }
      });

      let importRunning = false;
      let importCompletedNaturally = false;

      const stopImport = () => {
        importRunning = false;
        stopImportBtn.disabled = true;
        importBtn.textContent = 'Importar historial 2026';
      };

      stopImportBtn.addEventListener('click', () => {
        if (importRunning) {
          stopImport();
          setStatus('Importación detenida.', '');
        }
      });

      importBtn.addEventListener('click', async () => {
        if (importRunning) { stopImport(); setStatus('Importación detenida.', ''); return; }
        importRunning = true;
        importCompletedNaturally = false;
        stopImportBtn.disabled = false;
        importBtn.textContent = 'Detener ✕';
        setStatus('Importando historial…');

        while (importRunning) {
          try {
            const res = await fetch('/api/orders/older', {});
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Error loading older orders.');
            applyData(data);
            setStatus(`Importando… ${data.meta.loaded} órdenes — más antigua: ${formatDate(data.meta.oldest_date)}`);
            if (data.meta.done) {
              importCompletedNaturally = true;
              importRunning = false;
              break;
            }
            await new Promise((r) => setTimeout(r, 2000));
          } catch (err) {
            setStatus(err.message, 'err');
            importRunning = false;
            break;
          }
        }

        stopImportBtn.disabled = true;
        importBtn.textContent = 'Importar historial 2026';
        if (importCompletedNaturally) {
          setStatus('Enriqueciendo datos adicionales…');
          await enrichExtra();
          setStatus('Historia importada hasta 01/01/2026.', 'ok');
        }
      });

      exportBtn.addEventListener('click', async () => {
        exportBtn.disabled = true;
        setStatus('Appending new entries to Google Sheet…');
        try {
          const res = await fetch('/api/orders/export', { method: 'POST' });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Export failed.');
          setStatus(`Appended ${data.exported_rows} new rows. ${data.skipped_existing} already present.`, 'ok');
        } catch (err) {
          setStatus(err.message, 'err');
        } finally {
          exportBtn.disabled = false;
        }
      });

      openBtn.addEventListener('click', () => window.open(SHEET_URL, '_blank'));
      $('auth-btn').addEventListener('click', () => { window.location.href = '/api/meli/login'; });

      $('period-from').addEventListener('change', updateKPIs);
      $('period-to').addEventListener('change', updateKPIs);
      $('tax-category').addEventListener('change', updateKPIs);

      (async () => {
        try {
          const res = await fetch('/cdn-cgi/access/get-identity', { credentials: 'include' });
          if (res.ok) {
            const { email } = await res.json();
            $('header-user').textContent = `Hola, ${email.split('@')[0]}`;
          }
        } catch {}
      })();
    </script>
  </body>
</html>
